<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <app-navbar [title]="title" />
    <div class="content-area">
      <router-outlet />
    </div>
    <app-footer />
  </mat-sidenav-content>
</mat-sidenav-container>
